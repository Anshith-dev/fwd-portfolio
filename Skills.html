<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Skills</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(to right, #74ebd5, #ACB6E5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .skills-container {
            background: white;
            padding: 40px 60px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
        }

        .skills-container h1 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 32px;
            color: #333;
        }

       

        .skills-list li {
            background: #f4f4f4;
            margin: 12px 0;
            padding: 12px;
            border-radius: 8px;
            font-size: 18px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .skills-list li:hover {
            background: #4CAF50;
            color: white;
             
           
        }
         footer {
    background-color: rgb(11, 117, 131);
    color: black;
    text-align: center;
    padding: 10px;
    position: fixed;
    bottom: 0;
    width: 100%;
}
    </style>
</head>
<body>

    <div class="skills-container">
        <h1>My Skills</h1>
        <ul class="skills-list">
            <li>HTML</li>
            <li>CSS</li>
            <li>Basic Python</li>
            <li>C Programming</li>
        </ul>
    </div>
     <footer>© 2026 My Portfolio</footer>

</body>
</html>
